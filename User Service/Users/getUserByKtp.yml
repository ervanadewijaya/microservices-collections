docs: |-
  ## GET User by KTP

  Returns a single user enriched with full product details.
  Internally calls product-service `/internal/products/by-ids` via REST.

  **Path Param:** `ktpNumber = 3173170000000001`

  **Expected Response 200:**
  ```json
  {
    "status": 200,
    "message": "Success",
    "data": {
      "ktpNumber": "3173170000000001",
      "fullName": "Budi Santoso",
      "email": "budi@mail.com",
      "phoneNumber": "081234567890",
      "age": 30,
      "address": "Jl. Sudirman No. 1, Jakarta",
      "products": [
        {
          "id": 1,
          "productCode": "PRD001",
          "productName": "Laptop Gaming",
          "description": "High-performance gaming laptop with RTX 4060",
          "price": 15000000.0
        }
      ]
    }
  }
  ```

  **Not Found Response 404:**
  ```json
  {
    "status": 404,
    "message": "User not found: 1234567890123456"
  }
  ```

settings:
