  method: POST
  url: "{{base_url_user}}/api/users"
  body:
    type: json
    data: |-
      {
        "ktpNumber": "3173170000000099",
        "fullName": "Dewi Lestari",
        "email": "dewi@mail.com",
        "phoneNumber": "081298765432",
