docs: |-
  ## DELETE Remove User-Product Relations

  Internal endpoint called by product-service when a product is deleted.
  Removes all user-product associations for the given product ID.

  **Path Param:** `productId = 1`

  **Expected Response 200:** Empty body (no content).

