http:
  method: DELETE
  url: "{{base_url_product}}/api/products/1"
  auth: inherit

docs: |-
  ## DELETE Delete Product

  Deletes a product by ID.

  **Path Param:** `id = 1`

  **Side Effects:**
  - Calls user-service `/internal/users/product/{id}` to remove all user-product relations.
  - Publishes `DELETE_PRODUCT` event to `product-activity-topic`.

  **Expected Response 200:**
  ```json
  {
    "status": 200,
    "message": "Product deleted successfully"
  }
  ```

