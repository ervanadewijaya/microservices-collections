http:
  method: GET
  url: "{{base_url_product}}/api/products/activities"
  auth: inherit

docs: |-
  ## GET Product Activities

  Returns the product activity log consumed from `product-activity-topic` Kafka topic.

  **Kafka Actions:** `CREATE_PRODUCT`, `UPDATE_PRODUCT`, `DELETE_PRODUCT`

  **Expected Response 200:**
  ```json
  {
    "status": 200,
    "message": "Success",
    "data": [
      {
        "id": 1,
        "transactionNumber": "TRX-ABC123DEF456",
        "productId": 1,
        "userId": null,
        "action": "CREATE_PRODUCT",
        "description": "Product created: Laptop Gaming",
        "createdAt": "2026-05-30T08:00:00"
      }
    ]
  }
  ```

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
