http:
  method: GET
  url: "{{base_url_product}}/api/products/1/users"
  auth: inherit

docs: |-
  ## GET Product Users

  Returns all users associated with a product.
  Internally calls user-service `/internal/users/product/{id}`.

  **Path Param:** `id = 1`

  **Expected Response 200:**
  ```json
  {
    "status": 200,
    "message": "Success",
    "data": [
      {
        "id": 1,
        "ktpNumber": "3173170000000001",
        "fullName": "Budi Santoso",
        "email": "budi@mail.com"
      }
    ]
  }
  ```

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
